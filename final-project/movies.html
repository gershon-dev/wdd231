<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Browse Movies | CineScope — Movie Explorer</title>
  <meta name="description" content="Browse and filter hundreds of popular and top-rated movies on CineScope. Filter by genre, sort by rating or release date.">
  <meta name="author" content="Your Name">

  <!-- Open Graph -->
  <meta property="og:title"       content="Browse Movies | CineScope">
  <meta property="og:description" content="Filter and explore hundreds of movies on CineScope.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://yourusername.github.io/wdd231/final/movies.html">
  <meta property="og:image"       content="https://yourusername.github.io/wdd231/final/images/og-image.jpg">

  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css">

  <script src="scripts/movies.js" type="module" defer></script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <a href="index.html" class="logo-wrap" aria-label="CineScope Home">
      <span class="logo-icon" aria-hidden="true">◈</span>
      <span class="logo-text">Cine<span>Scope</span></span>
    </a>
    <button id="menu-btn" aria-label="Toggle navigation" aria-expanded="false" aria-controls="main-nav">
      <span></span><span></span><span></span>
    </button>
    <nav id="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="movies.html" class="active" aria-current="page">Movies</a>
      <a href="favourites.html">Favourites</a>
    </nav>
  </header>

  <!-- Page Hero -->
  <div class="page-hero" aria-label="Browse movies">
    <h1 class="page-hero__title">Browse Movies</h1>
    <p class="page-hero__sub">Discover popular films from around the world</p>
  </div>

  <main id="main-content">

    <!-- Controls -->
    <div class="controls-bar content-wrap">
      <div class="controls-left">
        <label for="genre-filter" class="sr-only">Filter by genre</label>
        <select id="genre-filter" class="control-select">
          <option value="">All Genres</option>
          <option value="28">Action</option>
          <option value="35">Comedy</option>
          <option value="18">Drama</option>
          <option value="27">Horror</option>
          <option value="10749">Romance</option>
          <option value="878">Sci-Fi</option>
          <option value="53">Thriller</option>
          <option value="16">Animation</option>
        </select>

        <label for="sort-select" class="sr-only">Sort by</label>
        <select id="sort-select" class="control-select">
          <option value="popularity.desc">Most Popular</option>
          <option value="vote_average.desc">Highest Rated</option>
          <option value="release_date.desc">Newest First</option>
          <option value="release_date.asc">Oldest First</option>
        </select>
      </div>

      <p class="results-count" id="results-count" aria-live="polite"></p>
    </div>

    <!-- Movie Grid -->
    <div class="content-wrap">
      <div id="movies-grid" class="movie-grid" aria-live="polite">
        <p class="loading-msg" role="status">Loading movies…</p>
      </div>

      <div class="pagination" id="pagination">
        <button class="btn btn--ghost" id="load-more">Load More</button>
      </div>
    </div>

  </main>

  <!-- MODAL -->
  <div id="movie-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <button class="modal__close" id="modal-close" aria-label="Close modal">✕</button>
      <div id="modal-content" class="modal__content">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <footer>
    <div class="footer__brand">
      <span class="logo-icon" aria-hidden="true">◈</span>
      <span class="logo-text">Cine<span>Scope</span></span>
    </div>
    <nav class="footer__links" aria-label="Footer navigation">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="favourites.html">Favourites</a>
      <a href="form.html">Contact</a>
      <a href="attributions.html">Attributions</a>
    </nav>
    <p class="footer__credit">
      Data provided by <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a> ·
      Built for WDD 231 ·
      <a href="https://youtube.com" target="_blank" rel="noopener">▶ Watch Demo</a>
    </p>
    <p class="footer__copy">© <span class="footer-year"></span> CineScope</p>
  </footer>

</body>
</html>
