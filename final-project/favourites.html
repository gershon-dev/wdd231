<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <a href="index.html" class="logo-wrap" aria-label="CineScope Home">
      <span class="logo-icon" aria-hidden="true">◈</span>
      <span class="logo-text">Cine<span>Scope</span></span>

    <button id="menu-btn" aria-label="Toggle navigation" aria-expanded="false" aria-controls="main-nav">

    <h1 class="page-hero__title">My Favourites</h1>
    <p class="page-hero__sub">Your saved movies — stored on this device</p>
  </section>

  <main id="main-content">
    <div class="content-wrap">

      <div class="favs-toolbar">
        <p id="favs-count" class="results-count" aria-live="polite"></p>
        <button class="btn btn--danger" id="clear-all-btn" hidden>Clear All</button>
      </div>

      <div id="favs-grid" class="movie-grid" aria-live="polite">
        <p class="loading-msg" role="status">Loading…</p>
      </div>

    </div>
  </main>

  <!-- MODAL -->
  <div id="movie-modal" class="modal" role="dialog" aria-modal="true" aria-label="Movie details" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <button class="modal__close" id="modal-close" aria-label="Close modal">✕</button>
      <div id="modal-content" class="modal__content"></div>
    </div>
  </div>
