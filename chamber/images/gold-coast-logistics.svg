<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#1a3a2a"/>
  <!-- Truck body -->
  <rect x="20" y="90" width="100" height="55" rx="5" fill="#f0c040"/>
  <!-- Truck cab -->
  <rect x="120" y="105" width="55" height="40" rx="5" fill="#f0c040"/>
  <!-- Cab window -->
  <rect x="128" y="112" width="30" height="18" rx="3" fill="#1a3a2a"/>
  <!-- Wheels -->
  <circle cx="55" cy="155" r="14" fill="#1a3a2a" stroke="#f0c040" stroke-width="3"/>
  <circle cx="55" cy="155" r="6" fill="#f0c040"/>
  <circle cx="145" cy="155" r="14" fill="#1a3a2a" stroke="#f0c040" stroke-width="3"/>
  <circle cx="145" cy="155" r="6" fill="#f0c040"/>
  <!-- Speed lines -->
  <line x1="10" y1="100" x2="40" y2="100" stroke="#c8960c" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="112" x2="30" y2="112" stroke="#c8960c" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="124" x2="35" y2="124" stroke="#c8960c" stroke-width="2" stroke-linecap="round"/>
  <!-- GCL text on truck -->
  <text x="65" y="125" font-family="Arial" font-size="22" font-weight="bold" fill="#1a3a2a" text-anchor="middle">GCL</text>
  <text x="100" y="190" font-family="Arial" font-size="10" font-weight="bold" fill="#f0c040" text-anchor="middle">GOLD COAST LOGISTICS</text>
</svg>
