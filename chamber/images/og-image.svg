<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <!-- Gold diagonal pattern -->
  <rect width="1200" height="630" fill="url(#pattern)" opacity="0.06"/>
  <defs>
    <pattern id="pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="40" x2="40" y2="0" stroke="#c8960c" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Left gold accent bar -->
  <rect x="0" y="0" width="12" height="630" fill="#c8960c"/>
  <!-- Logo circle -->
  <circle cx="180" cy="315" r="90" fill="#1a1200" stroke="#c8960c" stroke-width="4"/>
  <polygon points="180,250 197,295 245,295 208,320 222,368 180,342 138,368 152,320 115,295 163,295" fill="#f0c040"/>
  <!-- Main text -->
  <text x="310" y="280" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#f0c040" letter-spacing="2">Accra Chamber</text>
  <text x="310" y="355" font-family="Georgia, serif" font-size="40" fill="#aaa" letter-spacing="4">OF COMMERCE &amp; INDUSTRY</text>
  <!-- Divider -->
  <rect x="310" y="385" width="700" height="3" fill="#c8960c" rx="2"/>
  <!-- Tagline -->
  <text x="310" y="435" font-family="Arial, sans-serif" font-size="30" fill="#ccc">Member Directory — Connecting Business Across Ghana</text>
  <!-- URL -->
  <text x="310" y="510" font-family="Arial, sans-serif" font-size="22" fill="#666">gershonarthur.github.io/wdd231/chamber</text>
</svg>
