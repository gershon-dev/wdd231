<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#1c1c1c"/>
  <!-- Building silhouette -->
  <rect x="60" y="60" width="80" height="105" rx="3" fill="#444"/>
  <!-- Windows grid -->
  <rect x="70" y="72" width="18" height="14" rx="2" fill="#f0c040" opacity="0.9"/>
  <rect x="95" y="72" width="18" height="14" rx="2" fill="#f0c040" opacity="0.9"/>
  <rect x="120" y="72" width="12" height="14" rx="2" fill="#f0c040" opacity="0.5"/>
  <rect x="70" y="95" width="18" height="14" rx="2" fill="#f0c040" opacity="0.7"/>
  <rect x="95" y="95" width="18" height="14" rx="2" fill="#f0c040" opacity="0.9"/>
  <rect x="120" y="95" width="12" height="14" rx="2" fill="#f0c040" opacity="0.9"/>
  <rect x="70" y="118" width="18" height="14" rx="2" fill="#f0c040" opacity="0.9"/>
  <rect x="95" y="118" width="18" height="14" rx="2" fill="#f0c040" opacity="0.5"/>
  <rect x="120" y="118" width="12" height="14" rx="2" fill="#f0c040" opacity="0.8"/>
  <!-- Door -->
  <rect x="87" y="143" width="26" height="22" rx="2" fill="#f0c040" opacity="0.4"/>
  <!-- Ground line -->
  <rect x="20" y="165" width="160" height="4" rx="2" fill="#c8960c"/>
  <!-- Crane -->
  <line x1="155" y1="165" x2="155" y2="35" stroke="#c8960c" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="35" x2="90" y2="35" stroke="#c8960c" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="35" x2="90" y2="58" stroke="#c8960c" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Hook -->
  <circle cx="90" cy="62" r="4" fill="none" stroke="#c8960c" stroke-width="2"/>
  <text x="100" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#c8960c" text-anchor="middle">NIMBA CONSTRUCTION</text>
</svg>
